  <rect x="30" y="360" width="258" height="46" rx="6" fill="#1E293B"/>
  <text x="44" y="377" font-size="9" font-weight="700" fill="#64748B" letter-spacing="1">CALLER</text>
  <text x="44" y="393" font-size="11" fill="#94A3B8">model.py calls this module after</text>
  <text x="44" y="406" font-size="11" fill="#94A3B8">train/test split in data_pipeline.py</text>

