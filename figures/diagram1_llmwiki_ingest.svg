  <!-- Block 3: DATA LEAKAGE (amber highlight) -->
  <rect x="30" y="266" width="258" height="86" rx="6" fill="#1A0E00"/>
  <rect x="30" y="266" width="258" height="86" rx="6" fill="none" stroke="#D97706" stroke-width="1.5"/>
