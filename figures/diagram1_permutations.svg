<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <!-- background -->
  <rect width="880" height="620" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A1A">
    Same row, different histories under different permutations
  </text>
  <text x="440" y="60" text-anchor="middle" font-size="14" fill="#6B7280">
    Row 4 is a site C with target 2.10. Tree 1 and Tree 2 process rows in different orders.
  </text>

  <!-- ===================== TREE 1 ===================== -->
  <text x="40" y="110" font-size="16" font-weight="700" fill="#1A1A1A">Tree 1 permutation:</text>
  <text x="40" y="130" font-size="13" fill="#6B7280">Processing order: 1, 2, 3, 4, 5, 6, 7, 8</text>

  <!-- Row boxes for tree 1 -->
  <!-- Each row 90px wide, 60px tall -->
  <g transform="translate(40,150)">
    <!-- Row 1 -->
    <g>
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#9CA3AF">ROW 1</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">A</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#6B7280">y=1.20</text>
    </g>
    <!-- Row 2 -->
    <g transform="translate(100,0)">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#9CA3AF">ROW 2</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">B</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#6B7280">y=0.80</text>
    </g>
    <!-- Row 3 -->
    <g transform="translate(200,0)">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#9CA3AF">ROW 3</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">A</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#6B7280">y=1.40</text>
    </g>
    <!-- Row 4: TARGET, highlighted -->
    <g transform="translate(300,0)">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#2563EB">ROW 4</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">C</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#1F2937">y=2.10</text>
    </g>
    <!-- Vertical separator after row 4 -->
    <line x1="395" y1="-10" x2="395" y2="70" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
    <text x="345" y="-12" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">row 4 here</text>
    <!-- Row 5 (greyed, comes after) -->
    <g transform="translate(400,0)" opacity="0.35">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#9CA3AF">ROW 5</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">B</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#6B7280">y=0.90</text>
    </g>
    <!-- Row 6 (greyed) -->
    <g transform="translate(500,0)" opacity="0.35">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#9CA3AF">ROW 6</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">A</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#6B7280">y=1.30</text>
    </g>
    <!-- Row 7 (greyed) -->
    <g transform="translate(600,0)" opacity="0.35">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#9CA3AF">ROW 7</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">C</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#6B7280">y=2.30</text>
    </g>
    <!-- Row 8 (greyed) -->
    <g transform="translate(700,0)" opacity="0.35">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#9CA3AF">ROW 8</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">A</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#6B7280">y=1.50</text>
    </g>
  </g>

  <!-- Tree 1 history annotation -->
  <g transform="translate(40,235)">
    <text x="0" y="0" font-size="13" fill="#1F2937">
      <tspan font-weight="700">When row 4 is processed:</tspan>
      <tspan x="0" dy="20">prior site-C rows seen so far = </tspan>
      <tspan font-weight="700" fill="#DC2626">none</tspan>
    </text>
    <text x="0" y="48" font-size="13" fill="#1F2937">
      <tspan>Encoding = (0 + 1·1.44) / (0 + 1) = </tspan>
      <tspan font-weight="700" fill="#2563EB" font-size="15">1.44</tspan>
      <tspan fill="#9CA3AF" font-size="12"> &#160;(just the prior, no information yet)</tspan>
    </text>
  </g>

  <!-- Divider between trees -->
  <line x1="40" y1="320" x2="840" y2="320" stroke="#E5E7EB" stroke-width="1"/>

  <!-- ===================== TREE 2 ===================== -->
  <text x="40" y="350" font-size="16" font-weight="700" fill="#1A1A1A">Tree 2 permutation:</text>
  <text x="40" y="370" font-size="13" fill="#6B7280">Processing order: 5, 1, 7, 3, 8, 2, 6, 4</text>

  <g transform="translate(40,390)">
    <!-- Row 5 -->
    <g>
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#9CA3AF">ROW 5</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">B</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#6B7280">y=0.90</text>
    </g>
    <!-- Row 1 -->
    <g transform="translate(100,0)">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#9CA3AF">ROW 1</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">A</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#6B7280">y=1.20</text>
    </g>
    <!-- Row 7 - this is a C, important! -->
    <g transform="translate(200,0)">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">ROW 7</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">C</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#1F2937">y=2.30</text>
    </g>
    <!-- Row 3 -->
    <g transform="translate(300,0)">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#9CA3AF">ROW 3</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">A</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#6B7280">y=1.40</text>
    </g>
    <!-- Row 8 -->
    <g transform="translate(400,0)">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#9CA3AF">ROW 8</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">A</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#6B7280">y=1.50</text>
    </g>
    <!-- Row 2 -->
    <g transform="translate(500,0)">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#9CA3AF">ROW 2</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">B</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#6B7280">y=0.80</text>
    </g>
    <!-- Row 6 -->
    <g transform="translate(600,0)">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#9CA3AF">ROW 6</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">A</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#6B7280">y=1.30</text>
    </g>
    <!-- Row 4: TARGET (last in this permutation) -->
    <g transform="translate(700,0)">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.5"/>
      <text x="45" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#2563EB">ROW 4</text>
      <text x="45" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A">C</text>
      <text x="45" y="52" text-anchor="middle" font-size="11" fill="#1F2937">y=2.10</text>
    </g>
    <!-- Vertical separator before row 4 -->
    <line x1="695" y1="-10" x2="695" y2="70" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
    <text x="745" y="-12" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">row 4 here</text>

    <!-- Arc from row 7 to row 4 to show the C link -->
    <path d="M 245,-12 Q 470,-65 740,-12" fill="none" stroke="#D97706" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="470" y="-46" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">row 7 (also a C) was seen earlier</text>
  </g>

  <!-- Tree 2 history annotation -->
  <g transform="translate(40,475)">
    <text x="0" y="0" font-size="13" fill="#1F2937">
      <tspan font-weight="700">When row 4 is processed:</tspan>
      <tspan x="0" dy="20">prior site-C rows seen so far = </tspan>
      <tspan font-weight="700" fill="#D97706">{ row 7 with target 2.30 }</tspan>
    </text>
    <text x="0" y="48" font-size="13" fill="#1F2937">
      <tspan>Encoding = (2.30 + 1·1.44) / (1 + 1) = </tspan>
      <tspan font-weight="700" fill="#2563EB" font-size="15">1.87</tspan>
      <tspan fill="#9CA3AF" font-size="12"> &#160;(now informed by another C)</tspan>
    </text>
  </g>

  <!-- Bottom callout -->
  <rect x="40" y="555" width="800" height="50" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="440" y="580" text-anchor="middle" font-size="13" fill="#1F2937">
    <tspan font-weight="700">Same row, two different encodings: 1.44 vs 1.87.</tspan>
    <tspan> Each tree gets a different view, and across hundreds of trees the noise averages out.</tspan>
  </text>
</svg>
